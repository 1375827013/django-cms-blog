{% extends 'base.html' %}
{% block title %}专业类别{% endblock %}
{% block content %}
<div class="container">
    <h1 class="mb-4">专业类别</h1>
    
    <div class="row">
        {% for category in categories %}
        <div class="col-md-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5>{{ category.mc }}</h5>
                    <p class="text-muted">代码: {{ category.dm }}</p>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-md-12">
            <div class="alert alert-warning">暂无数据</div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
